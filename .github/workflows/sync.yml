name: Sync enhance from upstream and PR to Dev

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 2:00 AM UTC
  workflow_dispatch:

jobs:
  sync-enhance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout enhance branch
        uses: actions/checkout@v4
        with:
          ref: enhance
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/YimMenu/YimMenuV2.git
          git fetch upstream

      - name: Merge upstream enhance into fork enhance
        run: |
          git merge upstream/enhance --no-edit || true

      - name: Push updated enhance branch
        run: |
          git push origin enhance
      - name: Create Pull Request from enhance into dev
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Sync Merge upstream enhance into fork enhance"
          title: "Sync Merge enhance into dev"
          body: "Automated PR to sync changes from upstream enhance branch into dev for manual review."
          base: dev
          branch: enhance
