name: Sync Branch

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync-enhanced:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout enhanced branch
        uses: actions/checkout@v4
        with:
          ref: enhanced
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/YimMenu/YimMenuV2.git
          git fetch upstream

      - name: Merge upstream enhanced into fork enhanced
        run: |
          git merge upstream/enhanced --no-edit || true

      - name: Push updated enhanced branch
        env:
          PAT_WORKFLOW: ${{ secrets.PAT_WORKFLOW }}
        run: |
          git push https://x-access-token:${PAT_WORKFLOW}@github.com/${{ github.repository }} enhanced

      - name: Create Pull Request from enhanced into dev
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_WORKFLOW }}
          commit-message: "Sync Merge upstream enhanced into fork enhanced"
          title: "Sync Merge enhanced into dev"
          body: "Automated PR to sync changes from upstream enhanced branch into dev for manual review."
          base: dev
          branch: enhanced
